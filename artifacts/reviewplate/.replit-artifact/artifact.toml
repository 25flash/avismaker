kind = "web"
previewPath = "/"
title = "ReviewPlate"
version = "1.0.0"
id = "artifacts/reviewplate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24668

[services.development]
run = "pnpm --filter @workspace/reviewplate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reviewplate", "run", "build" ]
publicDir = "artifacts/reviewplate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24668"
BASE_PATH = "/"

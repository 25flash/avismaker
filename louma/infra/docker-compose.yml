services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: louma
      POSTGRES_PASSWORD: louma
      POSTGRES_DB: louma
    ports:
      - "5433:5432"
    volumes:
      - louma_postgres_data:/var/lib/postgresql/data

volumes:
  louma_postgres_data:
